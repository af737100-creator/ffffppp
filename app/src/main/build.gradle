android {
    compileSdk 35 // متوافق مع أندرويد 15

    defaultConfig {
        applicationId "com.example.recorder"
        minSdkVersion 26 // يدعم من أندرويد 8 (Oreo) فما فوق
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
